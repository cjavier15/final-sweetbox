name: sweet_box_flutter
description: Sweet Box Centralized Analytics System - Mobile Companion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  fl_chart: ^0.65.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  intl: ^0.18.1
  shimmer: ^3.0.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#C19A6B" # Your background color (Hex code)
  image: "assets/logo.png" # Path to your logo
  android: true
  ios: true
